name: Android Build (assembleDebug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
    - name: Preflight: capture runner environment and upload
      run: |
        set -x
        echo "HOSTNAME=$(hostname)" > preflight.txt
        echo "Date: $(date -u)" >> preflight.txt
        echo "UID: $(id)" >> preflight.txt
        echo "CWD: $(pwd)" >> preflight.txt
        echo "Disk usage:" >> preflight.txt
        df -h >> preflight.txt || true
        echo "List workspace:" >> preflight.txt
        ls -la > workspace-list.txt || true
        echo "Kernel and uname:" >> preflight.txt
        uname -a >> preflight.txt || true
        echo "Env sample:" >> preflight.txt
        env | sort | head -n 200 >> preflight.txt || true
        # also write a tiny always-present file
        echo "preflight-ok" > preflight2.txt || true
      # always upload the preflight so we have early artifacts even on fast failures
    - name: Upload preflight artifact
      uses: actions/upload-artifact@v4
      with:
        name: preflight
        path: |
          preflight.txt
          workspace-list.txt
          preflight2.txt
    - name: Install required packages
      run: |
        set -x
        sudo apt-get update > install_pkgs.log 2>&1 || true
        sudo apt-get install -y unzip wget gradle android-tools-adb >> install_pkgs.log 2>&1 || true
        tail -n 200 install_pkgs.log || true
    - name: Upload install packages log
      uses: actions/upload-artifact@v4
      with:
        name: install_pkgs_log
        path: install_pkgs.log
    - name: Install Android commandline tools
      run: |
        set -x
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        cd $ANDROID_SDK_ROOT/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip > cmdline_download.log 2>&1 || true
        unzip cmdline.zip -d temp >> cmdline_download.log 2>&1 || true
        # place commandlinetools at $ANDROID_SDK_ROOT/cmdline-tools/latest
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
        mv temp/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/ >> cmdline_download.log 2>&1 || true
        tail -n 200 cmdline_download.log || true
    - name: Upload cmdline download log
      uses: actions/upload-artifact@v4
      with:
        name: cmdline_download_log
        path: cmdline_download.log
    - name: Debug: environment info
      run: |
        echo "PATH=$PATH"
        java -version || true
        which gradle || true
        which adb || true
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT || true
    - name: Install Android SDK packages
      run: |
        set -x
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list > sdkmanager_pre_list.log 2>&1 || true
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "platform-tools" "platforms;android-33" "build-tools;33.0.2" > sdkmanager_install.log 2>&1 || true
        # accept licenses
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses > sdkmanager_licenses.log 2>&1 || true
        tail -n 200 sdkmanager_install.log || true
    - name: Upload sdkmanager logs
      uses: actions/upload-artifact@v4
      with:
        name: sdkmanager-logs
        path: |
          sdkmanager_pre_list.log
          sdkmanager_install.log
          sdkmanager_licenses.log
    - name: Dump sdkmanager list to file
      run: |
        set -x || true
        $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list > sdkmanager-list.txt || true
    - name: Upload sdkmanager output
      uses: actions/upload-artifact@v4
      with:
        name: sdkmanager-list
        path: |
          sdkmanager-list.txt
      continue-on-error: true
    - name: Add platform-tools to PATH
      run: echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
    - name: Set ANDROID_HOME
      run: echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    - name: Debug: list project files and gradle config
      run: |
        echo "--- workspace ---"
        ls -la
        echo "--- app dir ---"
        ls -la app || true
        echo "--- gradle files ---"
        for f in build.gradle settings.gradle settings.gradle.kts gradle.properties gradlew gradle/wrapper/gradle-wrapper.jar; do
          echo "---- $f ----"
          if [ -f "$f" ]; then
            stat "$f" || true
            sed -n '1,200p' "$f" || true
          else
            echo "(missing) $f"
          fi
        done
    - name: Prepare Gradle distribution (download if missing)
      run: |
        set -x
        DIST=gradle-8.5-bin.zip
        if [ ! -f "$DIST" ]; then
          echo "Downloading gradle distribution"
          wget https://services.gradle.org/distributions/$DIST -O $DIST > gradle_download.log 2>&1 || true
        else
          echo "Gradle distribution already present" > gradle_download.log 2>&1 || true
        fi
        ls -lah "$DIST" || true
        tail -n 200 gradle_download_log || true || true
    - name: Upload gradle download log
      uses: actions/upload-artifact@v4
      with:
        name: gradle-download-log
        path: gradle_download.log
    - name: Create gradle distribution info
      run: |
        set -x || true
        echo "Listing gradle wrapper dir" > gradle-info.txt || true
        ls -la gradle || true >> gradle-info.txt || true
        ls -la gradle/wrapper || true >> gradle-info.txt || true
    - name: Upload gradle distribution info
      uses: actions/upload-artifact@v4
      with:
        name: gradle-info
        path: gradle-info.txt
    - name: Verify wrapper and Gradle
      run: |
        set -x
        echo "./gradlew --version"
        if [ -x ./gradlew ]; then
          ./gradlew --version || true
          ./gradlew projects --no-daemon || true
        else
          echo "No gradlew executable"
          gradle --version || true
          gradle projects || true
        fi
    - name: Upload gradle wrapper output
      uses: actions/upload-artifact@v4
      with:
        name: gradle-wrapper-output
        path: |
          gradle-info.txt
          gradle/wrapper/gradle-wrapper.properties
          gradle/wrapper/gradle-wrapper.jar
    - name: Build assembleDebug (capture logs)
      run: |
        set -x
        # capture env
        env > env.txt || true
        echo "JAVA=" $(java -version 2>&1 | head -n 1) || true
        which java || true
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
        ls -la $ANDROID_SDK_ROOT || true
        which adb || true
        adb --version || true
        # run build and capture logs to build.log
        if [ -x ./gradlew ]; then
          ./gradlew assembleDebug --no-daemon --stacktrace > build.log 2>&1 || true
        else
          gradle assembleDebug --no-daemon --stacktrace > build.log 2>&1 || true
        fi
        # always show tail of log for quick visibility
        tail -n +1 build.log | sed -n '1,200p' || true
        ls -la app/build/outputs/apk/debug || true
    - name: Upload build.log artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    - name: On failure: collect workspace and logs
      if: failure()
      run: |
        set -x || true
        echo "Collecting workspace for debugging"
        tar -czf workspace-debug.tar.gz . || true
      # Upload the collected tarball so logs are available even if run fails quickly
    - name: Upload debug artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: workspace-debug
        path: workspace-debug.tar.gz
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    - name: On failure: collect workspace and logs
      if: failure()
      run: |
        set -x || true
        echo "Collecting workspace for debugging"
        tar -czf workspace-debug.tar.gz . || true
      # Upload the collected tarball so logs are available even if run fails quickly
    - name: Upload debug artifact
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: workspace-debug
        path: workspace-debug.tar.gz
